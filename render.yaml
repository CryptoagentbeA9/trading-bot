services:
  - type: web
    name: binance-trading-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && pip install -r requirements_dashboard.txt
    startCommand: python run_dashboard.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_API_SECRET
        sync: false
      - key: BINANCE_TESTNET
        value: true
